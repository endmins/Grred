<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7A4 - CONI | Quản Lý Thi Cử Chuyên Nghiệp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI+Variable:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --mica-bg: rgba(32, 32, 32, 0.6);
            --mica-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #60cdff;
            --accent-gold: #ffd700;
            --win-blue: #0078d4;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --surface-layer: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
            background-image: url('1.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0;
            min-height: 100vh;
        }

        /* Windows 11 Mica Card Style */
        .win11-card {
            background: var(--mica-bg);
            backdrop-filter: blur(50px) saturate(120%);
            -webkit-backdrop-filter: blur(50px) saturate(120%);
            border: 1px solid var(--mica-border);
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        /* Smart Status Effects */
        .status-past {
            opacity: 0.4;
            filter: grayscale(0.8);
            pointer-events: none;
        }

        .status-today {
            border: 1px solid var(--accent-cyan);
            box-shadow: 0 0 20px rgba(96, 205, 255, 0.2);
            background: rgba(96, 205, 255, 0.05);
            position: relative;
        }
        .status-today::before {
            content: 'ĐANG DIỄN RA';
            position: absolute;
            top: -10px; right: 10px;
            background: var(--accent-cyan);
            color: black;
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Time Highlight */
        .time-highlight {
            color: var(--accent-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
        }

        /* Checkbox (Win 11 Style) */
        .task-checkbox {
            appearance: none;
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .task-checkbox:checked {
            background-color: var(--win-blue);
            border-color: var(--win-blue);
        }
        .task-checkbox:checked::after {
            content: '✔';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px; color: white;
        }

        /* Progress Bar */
        .progress-container {
            background: rgba(255, 255, 255, 0.1);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-cyan), var(--win-blue));
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Segmented Control */
        .seg-control {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px;
            border-radius: 8px;
            display: inline-flex;
            border: 1px solid var(--mica-border);
        }
        .seg-btn {
            padding: 6px 24px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            color: rgba(255,255,255,0.6);
        }
        .seg-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* Music Widget - Top Right */
        .music-widget-mini {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #yt-player { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="p-4 pb-32">

    <!-- Header & Progress -->
    <header class="max-w-3xl mx-auto mb-8 pt-6">
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tight mb-1">Quản Lý Thi Cử</h1>
                <p class="text-sm text-[var(--text-secondary)]">HKII • 2025-2026 • 7A4 CONI</p>
            </div>
            <div class="text-right">
                <span id="progress-text" class="text-2xl font-bold text-[var(--accent-cyan)]">0%</span>
                <p class="text-[10px] uppercase font-bold tracking-wider opacity-60">Hoàn thành</p>
            </div>
        </div>
        
        <!-- Progress Bar -->
        <div class="progress-container mb-6">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <!-- Grade Selector -->
        <div class="flex justify-center">
            <div class="seg-control">
                <button onclick="setGrade(7)" id="btn-7" class="seg-btn active">Khối 7 (Chiều)</button>
                <button onclick="setGrade(8)" id="btn-8" class="seg-btn">Khối 8 (Chiều)</button>
            </div>
        </div>
    </header>

    <!-- Main Grid -->
    <main class="max-w-3xl mx-auto grid grid-cols-1 gap-4" id="schedule-grid">
        <!-- JS Injected -->
    </main>

    <!-- Footer Note -->
    <footer class="max-w-3xl mx-auto mt-8 mb-20">
        <div class="win11-card p-4 flex items-start gap-3 bg-[#00000040]">
            <i class="ph-fill ph-info text-[var(--accent-gold)] text-xl mt-0.5"></i>
            <div>
                <h4 class="font-bold text-sm mb-1 text-[var(--accent-gold)]">Lưu ý quan trọng</h4>
                <p class="text-xs leading-relaxed text-[var(--text-secondary)]">
                    Các môn <b>Âm nhạc, Mỹ thuật, GDTC, Tin học</b> kiểm tra theo tiết của từng lớp từ ngày <b>09/03 đến 20/03</b>.
                    Học sinh có mặt trước giờ làm bài 15 phút.
                </p>
            </div>
        </div>
        <div class="text-center mt-8 opacity-40 text-[10px] uppercase tracking-widest">
            Xây dựng bởi 7A4 • CONI
        </div>
    </footer>

    <!-- Mini Music Player -->
    <div class="music-widget-mini">
        <button onclick="toggleMusic()" class="flex items-center gap-2 text-white">
            <i class="ph-fill ph-play" id="play-icon"></i>
            <span class="text-xs font-semibold">Lofi Focus</span>
        </button>
    </div>

    <div id="yt-player"></div>

    <script>
        // --- DATA SETUP ---
        const schedules = {
            7: [
                { date: "2026-03-10", sub: "Công nghệ", time: "14:25 - 15:10", label: "Tiết 2 (45')", roomType: 0 },
                { date: "2026-03-11", sub: "Lịch sử", time: "14:25 - 15:10", label: "Tiết 2 (45')", roomType: 0 },
                { date: "2026-03-11", sub: "Địa lí", time: "15:20 - 16:05", label: "Tiết 3 (45')", roomType: 0 },
                { date: "2026-03-12", sub: "GDCD", time: "14:25 - 15:10", label: "Tiết 2 (45')", roomType: 0 },
                { date: "2026-03-13", sub: "KHTN", time: "14:25 - 15:55", label: "Tiết 2-3 (90')", roomType: 0 },
                { date: "2026-03-16", sub: "Tiếng Anh 7", time: "13:30 - 14:30", label: "Tiết 1 (60')", roomType: 1 },
                { date: "2026-03-18", sub: "Ngữ văn 7", time: "13:30 - 15:00", label: "Ca 1 (90')", roomType: 1 },
                { date: "2026-03-19", sub: "Toán 7", time: "13:30 - 15:00", label: "Ca 1 (90')", roomType: 1 },
            ],
            8: [
                { date: "2026-03-10", sub: "Công nghệ", time: "14:25 - 15:10", label: "Tiết 2 (45')", roomType: 0 },
                { date: "2026-03-11", sub: "Lịch sử", time: "14:25 - 15:10", label: "Tiết 2 (45')", roomType: 0 },
                { date: "2026-03-11", sub: "Địa lí", time: "15:20 - 16:05", label: "Tiết 3 (45')", roomType: 0 },
                { date: "2026-03-12", sub: "GDCD", time: "14:25 - 15:10", label: "Tiết 2 (45')", roomType: 0 },
                { date: "2026-03-13", sub: "KHTN", time: "14:25 - 15:55", label: "Tiết 2-3 (90')", roomType: 0 },
                { date: "2026-03-17", sub: "Tiếng Anh 8", time: "13:30 - 14:30", label: "Tiết 1 (60')", roomType: 1 },
                { date: "2026-03-18", sub: "Ngữ văn 8", time: "15:30 - 17:00", label: "Ca 2 (90')", roomType: 1 },
                { date: "2026-03-19", sub: "Toán 8", time: "15:30 - 17:00", label: "Ca 2 (90')", roomType: 1 },
            ]
        };

        let currentGrade = 7;
        let checkedItems = JSON.parse(localStorage.getItem('checkedExams')) || {};

        function setGrade(grade) {
            currentGrade = grade;
            document.getElementById('btn-7').className = grade === 7 ? 'seg-btn active' : 'seg-btn';
            document.getElementById('btn-8').className = grade === 8 ? 'seg-btn active' : 'seg-btn';
            render();
        }

        function toggleCheck(id) {
            if (checkedItems[id]) {
                delete checkedItems[id];
            } else {
                checkedItems[id] = true;
            }
            localStorage.setItem('checkedExams', JSON.stringify(checkedItems));
            updateProgress();
        }

        function updateProgress() {
            const data = schedules[currentGrade];
            const total = data.length;
            let count = 0;
            data.forEach((item, idx) => {
                const id = `${currentGrade}-${idx}`;
                if (checkedItems[id]) count++;
            });
            
            const percent = Math.round((count / total) * 100);
            document.getElementById('progress-bar').style.width = `${percent}%`;
            document.getElementById('progress-text').innerText = `${percent}%`;
        }

        function render() {
            const container = document.getElementById('schedule-grid');
            const data = schedules[currentGrade];
            const todayStr = new Date().toISOString().split('T')[0];

            let html = '';
            
            data.forEach((item, index) => {
                const id = `${currentGrade}-${index}`;
                const isChecked = checkedItems[id] ? 'checked' : '';
                
                let statusClass = '';
                if (item.date < todayStr) statusClass = 'status-past';
                if (item.date === todayStr) statusClass = 'status-today';

                const d = item.date.split('-');
                const displayDate = `${d[2]}/${d[1]}`;
                const dayName = new Date(item.date).toLocaleDateString('vi-VN', { weekday: 'long' });

                const roomBadge = item.roomType === 1 
                    ? `<span class="text-xs bg-red-500/20 text-red-300 px-2 py-0.5 rounded border border-red-500/30 flex items-center gap-1"><i class="ph-fill ph-map-pin"></i> Chia phòng</span>`
                    : `<span class="text-xs bg-green-500/20 text-green-300 px-2 py-0.5 rounded border border-green-500/30 flex items-center gap-1"><i class="ph-fill ph-house-line"></i> Tại lớp</span>`;

                html += `
                <div class="win11-card p-5 flex items-center gap-4 relative ${statusClass}">
                    <div>
                        <input type="checkbox" class="task-checkbox" ${isChecked} onclick="toggleCheck('${id}')">
                    </div>
                    <div class="flex flex-col items-center justify-center w-16 border-r border-white/10 pr-4">
                        <span class="text-[10px] font-bold uppercase opacity-60">${dayName}</span>
                        <span class="text-2xl font-bold text-white">${displayDate}</span>
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start">
                            <h3 class="text-xl font-bold leading-tight mb-1">${item.sub}</h3>
                            ${roomBadge}
                        </div>
                        <div class="flex items-center gap-3 mt-1">
                            <span class="text-2xl font-bold time-highlight tracking-tight">${item.time}</span>
                        </div>
                        <p class="text-xs text-[var(--text-secondary)] mt-1 font-semibold">${item.label}</p>
                    </div>
                </div>
                `;
            });
            
            container.innerHTML = html;
            updateProgress();
        }

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '0', width: '0', videoId: 'yJ6Lbsmb1lY',
                events: { 'onReady': () => {} }
            });
        }

        let isPlaying = false;
        function toggleMusic() {
            const icon = document.getElementById('play-icon');
            if (isPlaying) {
                player.pauseVideo();
                icon.className = 'ph-fill ph-play';
            } else {
                player.playVideo();
                icon.className = 'ph-fill ph-pause';
            }
            isPlaying = !isPlaying;
        }

        setGrade(7);
    </script>
</body>
</html>
