<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7A4 • Coni • Surface Stud.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(20, 20, 22, 0.82);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-yellow: #ffcc00;
            --blue-box: #0a84ff;
            --border-sep: rgba(255, 255, 255, 0.1);
            --radius-main: 28px;
            --radius-sm: 16px;
        }

        body.light-mode {
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-primary: #000000;
            --text-secondary: #48484a;
            --blue-box: #0071e3;
            --border-sep: rgba(0, 0, 0, 0.1);
        }

        * { -webkit-user-select: none; user-select: none; -webkit-user-drag: none; }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background-color: #000;
            background-image: url('1.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--text-primary);
            transition: all 0.5s ease;
            min-height: 100vh; overflow-x: hidden;
            /* Chuẩn bị cho hiệu ứng hút */
            transform-origin: center center;
        }

        /* HIỆU ỨNG HÚT VÀO PORTAL */
        body.sucked-in {
            transition: transform 1.5s cubic-bezier(0.5, 0, 0, 1), filter 1.5s ease, opacity 1.5s ease;
            transform: scale(15) rotate(10deg);
            filter: blur(20px) brightness(2);
            opacity: 0;
            pointer-events: none;
        }

        .apple-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-main);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        /* Easter Eggs Styles */
        body.rainbow-mode { animation: rainbow-anim 8s infinite linear; }
        @keyframes rainbow-anim { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        body.flip-mode { transform: rotate(180deg); }

        /* Stress Visualizer */
        .stress-mode { color: #ff3b30 !important; animation: heartBeat 1s infinite !important; }
        @keyframes heartBeat { 0%, 70%, 100% { transform: scale(1); } 14%, 42% { transform: scale(1.1); } }

        .liquid-glass-btn {
            background: rgba(10, 132, 255, 0.15);
            backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(10, 132, 255, 0.4);
            box-shadow: 0 8px 32px rgba(10, 132, 255, 0.2);
            border-radius: 50px;
            position: relative;
            overflow: hidden;
        }
        
        /* Hiệu ứng nháy sáng cho nút System khi bấm */
        .liquid-glass-btn.btn-active {
            animation: btnFlash 0.5s ease forwards;
        }
        @keyframes btnFlash {
            0% { box-shadow: 0 0 0 rgba(10, 132, 255, 0.5); background: rgba(10, 132, 255, 0.15); }
            50% { box-shadow: 0 0 50px rgba(10, 132, 255, 1); background: rgba(10, 132, 255, 0.8); color: #fff; transform: scale(1.1); }
            100% { box-shadow: 0 0 100vw rgba(10, 132, 255, 1); background: #fff; }
        }

        .bar-bg { background: rgba(120, 120, 128, 0.15); height: 8px; border-radius: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent-yellow); width: 0%; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        .date-container { display: flex; align-items: center; gap: 15px; padding-right: 15px; border-right: 1px solid var(--border-sep); }
        .date-blue { background: var(--blue-box); width: 56px; height: 56px; border-radius: var(--radius-sm); display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .status-past { opacity: 0.45; filter: grayscale(0.8); }
        .status-today { border: 2px solid var(--blue-box) !important; background: rgba(0, 113, 227, 0.05); }

        .luck-icon { animation: pulse-luck 2s infinite; cursor: pointer; }
        @keyframes pulse-luck { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.3); opacity: 1; } }

        .music-pop { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 380px; z-index: 1000; padding: 12px 20px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body oncontextmenu="return false;">

    <audio id="tickAudio" loop><source src="https://www.soundjay.com/clock/clock-ticking-2.mp3" type="audio/mpeg"></audio>
    <audio id="systemAudio" preload="auto"><source src="https://www.soundjay.com/mechanical/sounds/machine-processing-1.mp3" type="audio/mpeg"></audio>

    <nav class="max-w-4xl mx-auto flex justify-end p-6">
        <div onclick="toggleTheme()" class="w-12 h-12 apple-glass flex items-center justify-center cursor-pointer hover:scale-105 transition-transform">
            <i class="ph-bold ph-moon-stars text-xl" id="theme-icon"></i>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4">
        <section class="apple-glass p-8 md:p-10 mb-10 relative overflow-hidden">
            <div class="absolute top-4 right-6 text-green-400 text-3xl luck-icon" onclick="getLuck()">
                <i class="ph-fill ph-clover"></i>
            </div>

            <div class="flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="text-center md:text-left">
                    <span class="text-xs md:text-sm font-bold uppercase tracking-widest text-secondary block mb-2 opacity-60">Sắp vào học</span>
                    <h3 id="next-subject" class="text-3xl md:text-4xl font-extrabold tracking-tight" style="color: var(--blue-box);">Đang tải...</h3>
                </div>
                <div class="flex gap-4 md:gap-8 items-center" id="countdown-wrapper">
                    <div class="text-center">
                        <div id="cd-days" class="text-5xl md:text-6xl font-extrabold">00</div>
                        <span class="text-[10px] md:text-xs uppercase font-bold opacity-40">Ngày</span>
                    </div>
                    <div class="w-[1px] h-12 md:h-16 bg-gray-400 opacity-20"></div>
                    <div class="text-center">
                        <div id="cd-hours" class="text-5xl md:text-6xl font-extrabold">00</div>
                        <span class="text-[10px] md:text-xs uppercase font-bold opacity-40">Giờ</span>
                    </div>
                    <div class="w-[1px] h-12 md:h-16 bg-gray-400 opacity-20"></div>
                    <div class="text-center">
                        <div id="cd-mins" class="text-5xl md:text-6xl font-extrabold">00</div>
                        <span class="text-[10px] md:text-xs uppercase font-bold opacity-40">Phút</span>
                    </div>
                    <div class="w-[1px] h-12 md:h-16 bg-gray-400 opacity-20"></div>                
                    <div class="text-center">
                        <div id="cd-secs" class="text-5xl md:text-6xl font-extrabold text-blue-500">00</div>
                        <span class="text-[10px] md:text-xs uppercase font-bold opacity-40">Giây</span>
                    </div>
                </div>
            </div>
        </section>
        
        <div class="max-w-sm mx-auto mb-12 text-center">
            <div class="flex justify-between items-center mb-2 px-1">
                <span id="progress-label" class="text-[10px] font-black uppercase tracking-widest opacity-50 text-secondary cursor-pointer">Tiến độ kỳ thi</span>
                <span id="progress-text" class="text-[12px] font-black" style="color: #ffcc00;">0%</span>
            </div>
            <div class="bar-bg"><div id="progress-bar" class="bar-fill"></div></div>
        </div>

        <div id="schedule-grid" class="grid grid-cols-1 gap-4 mb-32"></div>

        <footer class="text-center pb-48 opacity-60">
            <div class="flex flex-col items-center gap-4">
                <h2 class="text-2xl font-black tracking-tighter" id="credit-7a4" class="cursor-pointer">7A4 • Coni • <span style="color: var(--blue-box);">Surface Stud.</span></h2>
                <a href="low-end.html" class="px-4 py-2 bg-red-500/10 text-red-500 rounded-full text-[10px] font-black uppercase border border-red-500/20">LAG? Chuyển bản Lite</a>
                
                <a href="https://hlthcs.vercel.app" id="system-btn" class="liquid-glass-btn flex items-center gap-2 px-6 py-3 mt-4 text-[13px] font-black uppercase text-white hover:scale-105 transition-all">
                    <i class="ph-bold ph-gear text-lg"></i> System
                </a>
            </div>
        </footer>
    </main>

    <div class="music-pop apple-glass flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="w-11 h-11 rounded-xl bg-[var(--blue-box)] flex items-center justify-center text-white shadow-lg animate-pulse"><i class="ph-fill ph-music-notes"></i></div>
            <div><h4 class="text-[13px] font-bold">Học đi.</h4><p class="text-[10px] opacity-50 italic">Coni • Surface Stud.</p></div>
        </div>
        <button onclick="toggleMusic()"><i class="ph-fill ph-play text-xl" id="play-icon" style="color: var(--blue-box);"></i></button>
    </div>
    <div id="yt-player"></div>

    <script>
        const schedules = [
            { date: "2026-03-10", day: "T3", sub: "Công nghệ", time: "14:25 - 15:10", label: "Tiết 2" },
            { date: "2026-03-11", day: "T4", sub: "Lịch sử", time: "14:25 - 15:10", label: "Tiết 2" },
            { date: "2026-03-11", day: "T4", sub: "Địa lí", time: "15:20 - 16:05", label: "Tiết 3" },
            { date: "2026-03-12", day: "T5", sub: "GDCD", time: "14:25 - 15:10", label: "Tiết 2" },
            { date: "2026-03-13", day: "T6", sub: "KHTN", time: "14:25 - 15:55", label: "90 phút" },
            { date: "2026-03-16", day: "T2", sub: "Tiếng Anh 7", time: "13:30 - 14:30", label: "60 phút", split: true },
            { date: "2026-03-18", day: "T4", sub: "Ngữ văn 7", time: "13:30 - 15:00", label: "90 phút", split: true },
            { date: "2026-03-19", day: "T5", sub: "Toán 7", time: "13:30 - 15:00", label: "90 phút", split: true },
        ];

        function render() {
            const grid = document.getElementById('schedule-grid');
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            
            grid.innerHTML = schedules.map(item => {
                const endTime = new Date(item.date + 'T17:00:00');
                const isPast = now > endTime;
                const status = isPast ? 'status-past' : (item.date === todayStr ? 'status-today' : '');
                
                return `
                <div class="apple-glass p-5 flex items-center justify-between ${status}">
                    <div class="flex items-center gap-5">
                        <div class="date-container"><div class="date-blue">
                            <span class="text-[9px] font-black text-white/60 uppercase">${item.day}</span>
                            <span class="text-2xl font-black text-white">${item.date.split('-')[2]}</span>
                        </div></div>
                        <div>
                            <h4 class="font-extrabold text-lg text-primary">${item.sub}</h4>
                            <div class="flex items-center gap-2"><span class="text-[10px] font-bold opacity-50 uppercase">${item.label}</span></div>
                            <div class="text-2xl font-black tracking-tighter mt-1" style="color: #ffcc00;">${item.time}</div>
                        </div>
                    </div>
                    ${isPast ? '<div class="text-[10px] font-black px-3 py-1 bg-green-500/20 text-green-500 rounded-lg border border-green-500/30">SURVIVED 🛡️</div>' : ''}
                </div>`;
            }).join('');
        }

        function updateCountdown() {
            const now = new Date();
            const tick = document.getElementById('tickAudio');
            const wrapper = document.getElementById('countdown-wrapper');
            const secText = document.getElementById('cd-secs');

            const next = schedules.find(item => new Date(`${item.date}T13:00:00`) > now);

            if (!next) {
                document.getElementById('next-subject').innerText = "Kỳ thi kết thúc!";
                ["cd-days", "cd-hours", "cd-mins", "cd-secs"].forEach(id => document.getElementById(id).innerText = "00");
                wrapper.classList.remove('stress-mode');
                tick.pause();
                return;
            }

            document.getElementById('next-subject').innerText = next.sub;
            const diff = new Date(`${next.date}T13:00:00`) - now;

            // Stress Mode
            if (diff < 3600000 && diff > 0) {
                wrapper.classList.add('stress-mode');
                secText.classList.remove('text-blue-500');
                tick.play().catch(() => {});
            } else {
                wrapper.classList.remove('stress-mode');
                secText.classList.add('text-blue-500');
                tick.pause();
            }

            document.getElementById('cd-days').innerText = Math.floor(diff / 864e5).toString().padStart(2, '0');
            document.getElementById('cd-hours').innerText = Math.floor((diff % 864e5) / 36e5).toString().padStart(2, '0');
            document.getElementById('cd-mins').innerText = Math.floor((diff % 36e5) / 6e4).toString().padStart(2, '0');
            document.getElementById('cd-secs').innerText = Math.floor((diff % 6e4) / 1000).toString().padStart(2, '0');
        }

        function updateProgress() {
            const now = new Date();
            const finished = schedules.filter(i => now > new Date(i.date + 'T17:00:00')).length;
            const p = Math.round((finished / schedules.length) * 100);
            document.getElementById('progress-bar').style.width = p + '%';
            document.getElementById('progress-text').innerText = p + '%';
        }

        // --- SỰ KIỆN NÚT SYSTEM ---
        document.getElementById('system-btn').addEventListener('click', function(e) {
            e.preventDefault(); // Chặn việc nhảy trang luôn
            const targetUrl = this.getAttribute('href');
            const sysAudio = document.getElementById('systemAudio');
            
            // 1. Phát âm thanh CPU Loading
            sysAudio.play().catch(() => { console.log("Trình duyệt chặn autoplay âm thanh."); });
            
            // 2. Tắt nhạc Youtube và nhạc đếm ngược (nếu đang bật) để nghe rõ tiếng CPU
            if (player && typeof player.pauseVideo === 'function') player.pauseVideo();
            document.getElementById('tickAudio').pause();

            // 3. Kích hoạt hiệu ứng sáng chói ở nút
            this.classList.add('btn-active');

            // 4. Kích hoạt hiệu ứng hút lỗ đen cho toàn bộ trang
            setTimeout(() => {
                document.body.classList.add('sucked-in');
            }, 150); // Delay nhẹ một nhịp cho nút kịp nháy sáng

            // 5. Chuyển trang sau khi hoàn thành animation (1.5 giây)
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 1500);
        });

        // Easter Egg Functions
        function getLuck() {
            const wishes = ["Vía 10 điểm! 🍀", "Trúng tủ nha! ✨", "7A4 vô đối! 🔥", "Bình tĩnh là thắng! 🧠"];
            alert(wishes[Math.floor(Math.random() * wishes.length)]);
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        function triggerFlip() { document.body.classList.toggle('flip-mode'); }
        function triggerRainbow() { document.body.classList.toggle('rainbow-mode'); }

        document.getElementById('progress-label').addEventListener('click', () => {
            window.tapCnt = (window.tapCnt || 0) + 1;
            setTimeout(() => window.tapCnt = 0, 1000);
            if (window.tapCnt === 5) triggerFlip();
        });

        document.getElementById('credit-7a4').addEventListener('click', () => {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 } });
        });

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            document.getElementById('theme-icon').className = isLight ? 'ph-bold ph-moon-stars text-xl' : 'ph-bold ph-sun-dim text-xl';
            document.body.style.backgroundImage = isLight ? "url('2.png')" : "url('1.png')";
        }

        var player;
        function onYouTubeIframeAPIReady() { 
            player = new YT.Player('yt-player', { height: '0', width: '0', videoId: 'yJ6Lbsmb1lY', playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'yJ6Lbsmb1lY' }}); 
        }
        function toggleMusic() { 
            const icon = document.getElementById('play-icon');
            if (player.getPlayerState() === 1) { player.pauseVideo(); icon.className = 'ph-fill ph-play text-xl'; } 
            else { player.playVideo(); icon.className = 'ph-fill ph-pause text-xl'; }
        }

        render(); updateCountdown(); updateProgress();
        setInterval(() => { updateCountdown(); updateProgress(); }, 1000);
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
