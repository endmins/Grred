<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7A4 - CONI | Lite Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .date-box { background: #0071e3; color: #fff; padding: 8px; border-radius: 8px; text-align: center; min-width: 50px; }
        .time { color: #b28900; font-weight: bold; }
        .bar-bg { background: #ddd; height: 12px; border-radius: 6px; overflow: hidden; margin: 15px 0; }
        .bar-fill { background: #ffcc00; height: 100%; width: 0%; transition: width 1s ease; }
        .survive-badge { font-size: 10px; font-weight: bold; color: #10b981; border: 1px solid #10b981; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="font-weight: 900; font-size: 1.4rem;">Lịch Thi Giữa Kì 2 (Lite)</h1>
        <div style="max-width: 300px; margin: 20px auto;">
            <div class="bar-bg"><div id="progress-bar" class="bar-fill"></div></div>
            <p id="progress-text" style="font-weight: bold; color: #ffcc00; font-size: 14px;">0% HOÀN THÀNH</p>
        </div>
    </div>

    <div id="list"></div>
    <a href="index.html" style="display: block; text-align: center; margin-top: 20px; color: #0071e3; text-decoration: none; font-weight: bold;">← Quay lại bản chính</a>

    <script>
        const data = [
            { date: "2026-03-10", sub: "Công nghệ", time: "14:25 - 15:10", day: "T3" },
            { date: "2026-03-11", sub: "Lịch sử", time: "14:25 - 15:10", day: "T4" },
            { date: "2026-03-11", sub: "Địa lí", time: "15:20 - 16:05", day: "T4" },
            { date: "2026-03-12", sub: "GDCD", time: "14:25 - 15:10", day: "T5" },
            { date: "2026-03-13", sub: "KHTN", time: "14:25 - 15:55", day: "T6" },
            { date: "2026-03-16", sub: "Tiếng Anh 7", time: "13:30 - 14:30", day: "T2" },
            { date: "2026-03-18", sub: "Ngữ văn 7", time: "13:30 - 15:00", day: "T4" },
            { date: "2026-03-19", sub: "Toán 7", time: "13:30 - 15:00", day: "T5" }
        ];

        const list = document.getElementById('list');
        const now = new Date();
        let finished = 0;

        list.innerHTML = data.map(item => {
            const isPast = now > new Date(item.date + 'T17:00:00');
            if(isPast) finished++;
            return `
                <div class="card" style="${isPast ? 'opacity: 0.5;' : ''}">
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <div class="date-box">
                            <div style="font-size: 10px;">${item.day}</div>
                            <div style="font-size: 18px; font-weight: bold;">${item.date.split('-')[2]}</div>
                        </div>
                        <div>
                            <div style="font-weight: bold;">${item.sub}</div>
                            <div class="time">${item.time}</div>
                        </div>
                    </div>
                    ${isPast ? '<span class="survive-badge">SURVIVED 🛡️</span>' : ''}
                </div>`;
        }).join('');

        const p = Math.round((finished / data.length) * 100);
        setTimeout(() => {
            document.getElementById('progress-bar').style.width = p + '%';
            document.getElementById('progress-text').innerText = p + '% HOÀN THÀNH';
        }, 200);
    </script>
</body>
</html>
